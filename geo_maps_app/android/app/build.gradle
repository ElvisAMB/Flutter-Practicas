// ============================================================
// build.gradle (app)  — Nivel de aplicación
// ============================================================

plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// ── Leer la clave de API desde local.properties ─────────────
// Agrega esta línea en android/local.properties (NO subir a git):
//   GOOGLE_MAPS_API_KEY=AIza...tu_clave_aqui
def googleMapsApiKey = localProperties.getProperty('GOOGLE_MAPS_API_KEY', '')

android {
    namespace "com.example.geo_maps_app"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.example.geo_maps_app"
        minSdkVersion 21         // Mínimo para google_maps_flutter
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        // Inyectar la clave de API en el Manifest como placeholder
        manifestPlaceholders += [GOOGLE_MAPS_API_KEY: googleMapsApiKey]
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
        debug {
            manifestPlaceholders += [GOOGLE_MAPS_API_KEY: googleMapsApiKey]
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
}
