name: geo_maps_app
description: App de Geolocalización con Google Maps
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Google Maps
  google_maps_flutter: ^2.5.3

  # Geolocalización
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Gestión de permisos
  permission_handler: ^11.3.0

  # Gestión de estado
  provider: ^6.1.2

  # HTTP requests (para Geocoding API)
  http: ^1.2.0

  # Íconos
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1

  # Utilidades
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/
    - assets/images/
